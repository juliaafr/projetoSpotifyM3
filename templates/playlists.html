<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Playlists - ValiMusic</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; color: white; }
        .navbar { background-color: #1DB954; }
        .btn-spotify { background-color: #1DB954; color: white; border: none; }
        .btn-spotify:hover { background-color: #17a349; color: white; }
        .table { color: white; }
        .table-dark { background-color: #1e1e1e; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">🎵 ValiMusic</a>
            <div>
                <a href="/musicas" class="btn btn-dark me-2">Músicas</a>
                <a href="/albums" class="btn btn-dark me-2">Álbuns</a>
                <a href="/playlists" class="btn btn-dark">Playlists</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>📋 Playlists</h2>
            <a href="/playlists/nova" class="btn btn-spotify">+ Nova Playlist</a>
        </div>

        <table class="table table-dark table-striped">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nome</th>
                    <th>Usuário</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody>
                {% for p in playlists %}
                <tr>
                    <td>{{ p.id_playlist }}</td>
                    <td>{{ p.nome }}</td>
                    <td>{{ p.nome_usuario }}</td>
                    <td>
                        <a href="/playlists/editar/{{ p.id_playlist }}" class="btn btn-warning btn-sm">Editar</a>
                        <a href="/playlists/deletar/{{ p.id_playlist }}" class="btn btn-danger btn-sm"
                           onclick="return confirm('Deletar essa playlist?')">Deletar</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

</body>
</html>
