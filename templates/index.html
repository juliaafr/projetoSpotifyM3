<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>ValiMusic</title>
    <!-- Bootstrap — deixa tudo bonitinho sem escrever CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; color: white; }
        .navbar { background-color: #1DB954; }
        .btn-spotify { background-color: #1DB954; color: white; border: none; }
        .btn-spotify:hover { background-color: #17a349; color: white; }
        .card { background-color: #1e1e1e; color: white; border: none; }
    </style>
</head>
<body>

    <!-- BARRA DE NAVEGAÇÃO -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">🎵 ValiMusic</a>
            <div>
                <a href="/musicas" class="btn btn-dark me-2">Músicas</a>
                <a href="/albums" class="btn btn-dark me-2">Álbuns</a>
                <a href="/playlists" class="btn btn-dark">Playlists</a>
            </div>
        </div>
    </nav>

    <!-- CONTEÚDO PRINCIPAL -->
    <div class="container mt-5 text-center">
        <h1 class="fw-bold">Bem-vindo ao ValiMusic 🎧</h1>
        <p class="text-secondary mt-3">Gerencie músicas, álbuns e playlists</p>

        <div class="row mt-5 justify-content-center">
            <div class="col-md-3 mb-4">
                <div class="card p-4 text-center">
                    <h3>🎵</h3>
                    <h5>Músicas</h5>
                    <a href="/musicas" class="btn btn-spotify mt-3">Gerenciar</a>
                </div>
            </div>
            <div class="col-md-3 mb-4">
                <div class="card p-4 text-center">
                    <h3>💿</h3>
                    <h5>Álbuns</h5>
                    <a href="/albums" class="btn btn-spotify mt-3">Gerenciar</a>
                </div>
            </div>
            <div class="col-md-3 mb-4">
                <div class="card p-4 text-center">
                    <h3>📋</h3>
                    <h5>Playlists</h5>
                    <a href="/playlists" class="btn btn-spotify mt-3">Gerenciar</a>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
