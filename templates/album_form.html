<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Álbum - ValiMusic</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; color: white; }
        .navbar { background-color: #1DB954; }
        .btn-spotify { background-color: #1DB954; color: white; border: none; }
        .btn-spotify:hover { background-color: #17a349; color: white; }
        .card { background-color: #1e1e1e; color: white; border: none; }
        .form-control { background-color: #2a2a2a; color: white; border: 1px solid #444; }
        .form-control:focus { background-color: #2a2a2a; color: white; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">🎵 ValiMusic</a>
            <div>
                <a href="/musicas" class="btn btn-dark me-2">Músicas</a>
                <a href="/albums" class="btn btn-dark me-2">Álbuns</a>
                <a href="/playlists" class="btn btn-dark">Playlists</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="card p-4" style="max-width: 600px; margin: auto;">
            <h3 class="mb-4">{{ "Editar" if album else "Novo" }} Álbum</h3>

            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Nome</label>
                    <input type="text" name="nome" class="form-control"
                           value="{{ album.nome if album else '' }}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Cantor</label>
                    <input type="text" name="cantor" class="form-control"
                           value="{{ album.cantor if album else '' }}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Ano de Lançamento</label>
                    <input type="number" name="ano_lancamento" class="form-control"
                           value="{{ album.ano_lancamento if album else '' }}">
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-spotify">Salvar</button>
                    <a href="/albums" class="btn btn-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>

</body>
</html>
