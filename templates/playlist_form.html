<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Playlist - ValiMusic</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; color: white; }
        .navbar { background-color: #1DB954; }
        .btn-spotify { background-color: #1DB954; color: white; border: none; }
        .btn-spotify:hover { background-color: #17a349; color: white; }
        .card { background-color: #1e1e1e; color: white; border: none; }
        .form-control, .form-select { background-color: #2a2a2a; color: white; border: 1px solid #444; }
        .form-control:focus, .form-select:focus { background-color: #2a2a2a; color: white; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">🎵 ValiMusic</a>
            <div>
                <a href="/musicas" class="btn btn-dark me-2">Músicas</a>
                <a href="/albums" class="btn btn-dark me-2">Álbuns</a>
                <a href="/playlists" class="btn btn-dark">Playlists</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="card p-4" style="max-width: 600px; margin: auto;">
            <h3 class="mb-4">{{ "Editar" if playlist else "Nova" }} Playlist</h3>

            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Nome</label>
                    <input type="text" name="nome" class="form-control"
                           value="{{ playlist.nome if playlist else '' }}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Usuário</label>
                    <select name="id_usuario" class="form-select" required>
                        {% for u in usuarios %}
                        <option value="{{ u.id_usuario }}"
                            {{ 'selected' if playlist and playlist.id_usuario == u.id_usuario else '' }}>
                            {{ u.nome }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-spotify">Salvar</button>
                    <a href="/playlists" class="btn btn-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>

</body>
</html>
